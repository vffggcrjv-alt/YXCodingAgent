providers:
  - name: superaiapi
    protocol: openai-compat
    base_url: https://superaiapi.top/v1
    api_key: "${OPENAI_API_KEY}"
    model: gpt-5.6-luna
  - name: superaiapi-anthropic
    protocol: anthropic
    base_url: https://superaiapi.top
    api_key: "${ANTHROPIC_API_KEY}"
    model: claude-sonnet-4-20250514
    thinking: true

permission_mode: default

mcp_servers:
  - name: context7
    command: npx
    args: ["-y", "@upstash/context7-mcp"]

  # Streamable HTTP example (2025-03-26 spec, default when url is set):
  # - name: my-http-mcp
  #   url: https://example.com/mcp
  #   transport: http   # optional; "http" (default) or "sse"
  #   headers:
  #     Authorization: "Bearer ${MY_TOKEN}"

enable_coordinator_mode: false   # 设为 true 后创建 Team 时 Lead 只能调度不能写代码
